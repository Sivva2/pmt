services:
  db:
    image: postgres:16-alpine
    container_name: pmt-db
    environment:
      POSTGRES_DB: pmt
      POSTGRES_USER: pmt
      POSTGRES_PASSWORD: pmt
    ports:
      - "5432:5432"
    volumes:
      - pmt-db-data:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmt -d pmt"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pmt-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USER:-sivva2}/pmt-backend:${TAG:-latest}
    container_name: pmt-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/pmt
      DB_USER: pmt
      DB_PASSWORD: pmt
    ports:
      - "8080:8080"
    networks:
      - pmt-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USER:-sivva2}/pmt-frontend:${TAG:-latest}
    container_name: pmt-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
    networks:
      - pmt-net

volumes:
  pmt-db-data:

networks:
  pmt-net:
    driver: bridge
